[package]
name = "worldchat"
version = "0.1.0"
edition = "2024"
default-run = "worldchat"

[dependencies]
async-channel = "2.5.0"
base32 = "0.5.1"
bevy = "0.18.1"
iroh = { version = "0.97", default-features = false }
iroh-gossip = { version = "0.97", default-features = false, features = ["net"] }
pkarr = { version = "5.0.3", default-features = false, features = ["relays"] }
rand = "0.9.2"
tokio = { version = "1", default-features = false, features = ["sync"] }
tokio-stream = "0.1.18"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
